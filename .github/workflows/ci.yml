name: CI
on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
permissions:
  contents: read
  pull-requests: read
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          backend:
            - 'backend/**'
          frontend:
            - 'frontend/**'
          e2e:
            - 'e2e/**'
          workflow:
            - '.github/workflows/ci.yml'
  backend:
    needs: changes
    # On push to master always run (gates CD). On PRs run only when relevant paths change.
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: backend/uv.lock
    - name: Install backend deps
      run: uv sync --all-groups
      working-directory: backend
    - name: Run backend tests
      run: uv run pytest
      working-directory: backend
  frontend:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install frontend deps
      run: npm ci
      working-directory: frontend
    - name: Run frontend tests
      run: npm test
      working-directory: frontend
  e2e:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: backend/uv.lock
    - name: Install backend deps
      run: uv sync
      working-directory: backend
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          e2e/package-lock.json
    - name: Install frontend deps
      run: npm ci
      working-directory: frontend
    - name: Install e2e deps
      run: npm ci
      working-directory: e2e
    - name: Resolve Playwright version
      id: pw
      run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      working-directory: e2e
    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
    - name: Install Playwright browser
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium
      working-directory: e2e
    - name: Install Playwright system deps (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
      working-directory: e2e
    - name: Run e2e tests
      run: npm test
      working-directory: e2e
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          e2e/playwright-report
          e2e/test-results
        if-no-files-found: ignore
        retention-days: 14
  ci:
    if: always()
    needs: [changes, backend, frontend, e2e]
    runs-on: ubuntu-latest
    steps:
    - name: Verify upstream jobs
      run: |
        results='${{ toJson(needs) }}'
        echo "$results"
        echo "$results" | python3 -c '
        import json, sys
        data = json.load(sys.stdin)
        bad = [n for n, v in data.items() if v["result"] not in ("success", "skipped")]
        if bad:
            print(f"Failed/cancelled jobs: {bad}")
            sys.exit(1)
        '
