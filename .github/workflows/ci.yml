name: CI
on:
  pull_request:
    branches: [ "master" ]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: backend_py/uv.lock
    - name: Install backend deps
      run: uv sync --all-groups
      working-directory: backend_py
    - name: Run backend tests
      run: uv run pytest
      working-directory: backend_py
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install frontend deps
      run: npm ci
      working-directory: frontend
    - name: Run frontend tests
      run: npm test
      working-directory: frontend
  e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: backend_py/uv.lock
    - name: Install backend deps
      run: uv sync
      working-directory: backend_py
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install frontend deps
      run: npm ci
      working-directory: frontend
    - name: Install e2e deps
      run: npm install
      working-directory: e2e
    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium
      working-directory: e2e
    - name: Run e2e tests
      run: npm test
      working-directory: e2e
