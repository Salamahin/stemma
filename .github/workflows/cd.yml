name: "Deploy to AWS"
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend_py/uv.lock

      - name: Export backend requirements
        working-directory: backend_py
        run: uv export --no-dev --no-hashes --no-emit-project --format requirements.txt -o requirements.txt

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Build SAM
        run: sam build

      - name: Deploy backend
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: frontend
        run: npm i

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          STEMMA_BACKEND_URL: ${{ secrets.STEMMA_BACKEND_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Hash frontend bundles
        working-directory: frontend
        run: node scripts/hash-build.mjs

      - name: Upload hashed bundles to S3
        run: |
          aws s3 sync frontend/public/build s3://${{ secrets.AWS_S3_BUCKET }}/build \
            --exclude "*" \
            --include "bundle-*.js" --include "bundle-*.css" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Upload static assets to S3
        run: |
          aws s3 sync frontend/public s3://${{ secrets.AWS_S3_BUCKET }} \
            --exclude "index.html" \
            --exclude "build/bundle-*.js" --exclude "build/bundle-*.css" \
            --cache-control "public, max-age=86400" \
            --delete

      - name: Upload index.html to S3
        run: |
          aws s3 cp frontend/public/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html \
            --cache-control "no-cache" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: "eu-central-1"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
