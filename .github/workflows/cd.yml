name: "Deploy to AWS"
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend_py/uv.lock

      - name: Export backend requirements
        working-directory: backend_py
        run: uv export --no-dev --no-hashes --no-emit-project --format requirements.txt -o requirements.txt

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Build SAM
        run: sam build

      - name: Deploy backend
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Run database migrations
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name stemma-app \
            --logical-resource-id MigrationFunction \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text)
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --cli-binary-format raw-in-base64-out \
            --payload '{}' \
            /tmp/migration-output.json
          cat /tmp/migration-output.json
          if jq -e '.errorMessage' /tmp/migration-output.json > /dev/null 2>&1; then
            echo "Migration failed!"
            exit 1
          fi

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        working-directory: frontend
        run: npm i

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          STEMMA_BACKEND_URL: ${{ secrets.STEMMA_BACKEND_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Upload to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'eu-central-1'
          SOURCE_DIR: 'frontend/public'

      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: "eu-central-1"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
